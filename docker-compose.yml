services:
  # ─── AI Agent Brain ───
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: koji-hermes
    command: ["gateway", "run"]
    ports:
      - "8642:8642"   # Gateway JSON-RPC/WebSocket + REST API (OpenAI-compatible)
    volumes:
      - hermes_data:/opt/data
      - ./hermes/profiles:/opt/data/profiles:ro
      - ./hermes/skills:/opt/data/skills:ro
      - ./ops/source-manifests:/opt/data/manifests:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL_TAG=${OLLAMA_MODEL_TAG:-qwen3.6}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama-local-no-auth}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - LANGFUSE_BASE_URL=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY:-koji-phase1-local}
      - DELIVERY_CHANNEL=${DELIVERY_CHANNEL:-telegram}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    depends_on:
      - langfuse

  # ─── Observability ───
  langfuse:
    image: langfuse/langfuse:2
    container_name: koji-langfuse
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=${LANGFUSE_SALT:-change-me-in-production}
    restart: unless-stopped
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:16-alpine
    container_name: koji-langfuse-db
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    restart: unless-stopped

volumes:
  hermes_data:
  langfuse_db:
