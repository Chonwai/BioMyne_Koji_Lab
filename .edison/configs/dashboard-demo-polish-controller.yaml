loop_id: dashboard-demo-polish-v1
loop_type: one-feature-build
quality_mode: strict
pass_threshold: 95
description: >
  Polish the Koji dashboard specifically for internal stakeholder demos and add
  direct source links from entity-related references back to the originating article URLs.

trigger:
  type: manual
  initiated_by: founder
  context: "Stakeholder-facing refinement after dashboard-local env cleanup"

scope:
  primary_repo: BiomyneKoji/biomyne-koji-dashboard
  supporting_repo: BiomyneKoji/biomyne-koji
  slices:
    - remove remaining template interaction noise from Koji workspace chrome
    - tighten stakeholder-facing copy in search/navigation surfaces
    - add source URL deep links in entity related-article references
    - update engineering docs and loop artifacts to reflect the demo-polish result

budget:
  max_tokens: 120000
  max_iterations: 3
  max_wall_time: 3h

write_policy:
  allowed_paths:
    - BiomyneKoji/biomyne-koji-dashboard/**
    - BiomyneKoji/biomyne-koji/docs/**
    - .edison/**
  forbidden_paths:
    - BiomyneKoji/biomyne-koji/.env
    - BiomyneKoji/biomyne-koji/sql/**

human_gates:
  - after_step: demo-polish
    condition: "runtime regression appears on key Koji pages"
    action: "Escalate with blocker note"
  - after_step: demo-polish
    condition: "demo polish and validation complete"
    action: "Present stakeholder-ready demo summary"

dispatch:
  steps:
    - id: demo-polish
      skill: edison-tech-lead-dev-workflow
      required: true
      purpose: "Polish Koji demo surfaces and add reference deep links"

escalation:
  destination: founder
  trigger_conditions:
    - repeated_fail_x3
    - budget_exhausted
    - circuit_breaker_active
